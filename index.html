<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>DOM操作</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <h3>親要素: parentElement</h3>
    <div id="parent-pink-box">
      <div>親：ドラゴン</div>
      <div id="luffy">ルフィ(基点)</div>
    </div>

    <h3>子要素: children</h3>
    <div id="parent">
      <div>親：ジャッジ(基点)</div>
      <div>イチジ</div>
      <div>ニジ</div>
      <div>サンジ</div>
      <div>ヨンジ</div>
    </div>
    <h3 id="last-h3">前後の要素</h3>
    <div id="siblings">
    <div>ナミ</div>
    <div id="zoro">ゾロ(基点)</div>
    <div>ウソップ</div>
    </div>
    <h3>要素の追加:createElement</h3>
    <div id="frineds">
      <div>ナミ</div>
      <div>ゾロ</div>
      <div>ウソップ</div>
    </div>
    <h3>要素の置き換え:replaceChild(new, old)</h3>
    <div id="emperors">
      <div>シャンクス</div>
      <div>カイドウ</div>
      <div>ビックマム</div>
      <div id="old">白ひげ</div>
    </div>
    <h3>要素の複製:cloneNode<br>要素の削除:removeChild</h3>
    <div id="partner">
      <div id="nami">ナミ</div>
      <div>サンジ</div>
    </div>    
    <script src="index.js"></script>
  </body>
</html>
