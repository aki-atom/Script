<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title>フォームの操作</title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" media="screen" href="style.css">
  </head>
  <body>
    <form>
      <div>
        <p>
          <label for="name">キャラクター：</label>
          <button id="name_btn">正解は？</button>
        </p>
        <input id="name" name="name" type="text" value="私は誰でしょう？">
      </div>
      <div>
        <p><label for="profile">プロフィール：</label></p>
        <p>
          <textarea id="profile" name="profile">身長: 240cm, 好きな食べ物: ハンバーガー
          </textarea>
        </p>
        <button id="textarea_btn">valueで取得したもの↓</button>
        <p id="textarea_value"></p>
      </div>
      <div>
        <label for="admiral_members">一番強いのは誰？：</label>
        <select id="admiral_members" name="admiral_members">
          <option value="赤犬">赤犬</option>
          <option value="青雉">青雉</option>
          <option value="黄猿">黄猿</option>
        </select>
        <div>
          <img id="select_value" src="img/akainu.png">
      </div>     
         <div>
          <p>四校最強は誰？</p>
          <label>
            <input name="four_emperors" type="radio" value="白ひげ"/>白ひげ
          </label>
          <label>
            <input name="four_emperors" type="radio" value="シャンクス" />シャンクス
          </label>
          <label>
            <input name="four_emperors" type="radio" value="カイドウ" />カイドウ
          </label>
          <label>
            <input name="four_emperors" type="radio" value="ビッグマム" />ビッグマム
          </label>
          <p>
            <button id="four_emperors_btn">あなたが選んだものは？</button>
            <span id="radio_value"></span>
          </p>
        </div>
        <div>
          欲しい悪魔の実は？
          <label>
            <input name="devil_fruits" type="checkbox" value="ゴムゴムの実" />ゴムゴムの実
          </label>
          <label>
            <input name="devil_fruits" type="checkbox" value="ゴロゴロの実" />ゴロゴロの実
          </label>
          <label>
            <input name="devil_fruits" type="checkbox" value="スケスケの実" />スケスケの実
          </label>
          <p><button id="devil_fruits_btn">あなたが選んだものは？</button></p>
          <span id="devil_fruits_value"></span>
        </div>
      </div>
      </form>
    <script src="index.js"></script>
  </body>
</html>
