<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <title></title>
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <link rel="stylesheet" media="screen" href="style.css">
  </head>
  <body>
    <h1>悪魔の実を生成</h1>
    <form id="form">
      <div>
        <label for="text">材料： </label>
        <input type="text" id="text" required maxlength="3"
          minlength="2" pattern="[\u30A1-\u30F6]*"/>
      </div>
      <div id="text_error" class="error">
      </div>
      <p>出来上がった悪魔の身は</p>
      <h2 id="resultForm"></h2>
      <p><input id="button" type="submit" value="作成する" />
    </form>
    <img src="img/doflamingo.png">
    <script src="index.js"></script>
  </body>
</html>
